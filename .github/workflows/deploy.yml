# 自動部署到 GitHub Pages，讓遊戲可以直接在瀏覽器上玩。
# 啟用方式：Repo → Settings → Pages → Build and deployment → Source 選「GitHub Actions」。
# 之後每次 push 到 main 都會自動 build 並發佈到 https://<user>.github.io/<repo>/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # enablement: true 會在首次部署時自動開啟 Pages，省去手動到 Settings 設定。
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
